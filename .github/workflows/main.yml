name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    name: deploy
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify production dependencies install (not uploaded — symlinks break FTP)
        run: |
          npm ci --omit=dev
          node -e "require('iconv-lite').encodingExists('utf8')"
          echo "npm ci OK ($(du -sh node_modules | cut -f1))"

      - name: Bump deploy version (MAJOR.MINOR.<run#> on every push)
        id: bump_version
        run: |
          DEPLOY_VERSION="$(node deploy/bump-deploy-version.js)"
          echo "deployVersion=${DEPLOY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploy version: ${DEPLOY_VERSION}"

      - name: Write deploy build-info (version stamp for /health and /api/version)
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > deploy/build-info.json <<EOF
          {
            "deployVersion": "${{ steps.bump_version.outputs.deployVersion }}",
            "deployNumber": ${GITHUB_RUN_NUMBER},
            "gitCommit": "${GITHUB_SHA}",
            "gitCommitShort": "${SHORT}",
            "gitBranch": "${GITHUB_REF_NAME}",
            "deployedAt": "${DEPLOYED_AT}",
            "buildLabel": "v${{ steps.bump_version.outputs.deployVersion }}-${SHORT}",
            "workflowRunId": "${GITHUB_RUN_ID}"
          }
          EOF
          echo "Build stamp:"
          cat deploy/build-info.json

      - name: Sync application files (exclude node_modules — install on server via SSH)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: 192.249.118.80
          username: pos@testv3.websitedemolynk.com
          password: kYw8,ae@!1&]}dMR
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/node_modules
            deploy/github_actions_key.pem
            deploy/github_actions_key.pem.example

      - name: Restart app on server — npm ci + pm2 pos_admin (SSH)
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          write_key_from_text() {
            if echo "$1" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
              printf '%s\n' "$1" > key.pem
            else
              {
                echo "-----BEGIN OPENSSH PRIVATE KEY-----"
                printf '%s\n' "$1"
                echo "-----END OPENSSH PRIVATE KEY-----"
              } > key.pem
            fi
          }

          if [ -f deploy/github_actions_key.pem ] && grep -q "BEGIN OPENSSH PRIVATE KEY" deploy/github_actions_key.pem; then
            cp deploy/github_actions_key.pem key.pem
          elif [ -f deploy/github_actions_key.pem.example ] && grep -q "BEGIN OPENSSH PRIVATE KEY" deploy/github_actions_key.pem.example; then
            cp deploy/github_actions_key.pem.example key.pem
          elif [ -n "$SSH_KEY" ]; then
            write_key_from_text "$SSH_KEY"
          else
            echo "::warning::No SSH key — run on server: cd /home/demowebsitv3/public_html/pos_admin && npm ci --omit=dev && pm2 restart pos_admin --update-env"
            exit 0
          fi
          sed -i 's/\r$//' key.pem
          chmod 600 key.pem

          mkdir -p ~/.ssh
          ssh-keyscan -H 192.249.118.80 >> ~/.ssh/known_hosts 2>/dev/null || true

          if ssh -i key.pem -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new root@192.249.118.80 <<'ENDSSH'
          set -e
          APP_DIR=/home/demowebsitv3/public_html/pos_admin
          APP_USER=demowebsitv3
          cd "$APP_DIR"
          export PATH="/usr/local/bin:/usr/bin:$PATH"
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi
          node -e "require('iconv-lite').encodingExists('utf8')"
          chown -R "${APP_USER}:${APP_USER}" "$APP_DIR"
          if [ -f deploy/build-info.json ]; then
            echo "=== Live build stamp (deploy/build-info.json) ==="
            cat deploy/build-info.json
          fi
          pm2 delete pos-api 2>/dev/null || true
          if pm2 describe pos_admin >/dev/null 2>&1; then
            pm2 restart pos_admin --update-env
          else
            pm2 start index.js --name pos_admin
          fi
          pm2 save || true
          ENDSSH
          then
            echo "App restarted via pm2 (pos_admin)."
          else
            echo "::warning::SSH failed — run on server: cd /home/demowebsitv3/public_html/pos_admin && npm ci --omit=dev && pm2 restart pos_admin --update-env"
            exit 1
          fi
