name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    name: deploy
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Sync file
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: 192.249.118.80
          username: pos@testv3.websitedemolynk.com
          password: kYw8,ae@!1&]}dMR
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            deploy/github_actions_key.pem
            deploy/github_actions_key.pem.example

      - name: Restart app on server (SSH)
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          write_key_from_text() {
            if echo "$1" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
              printf '%s\n' "$1" > key.pem
            else
              {
                echo "-----BEGIN OPENSSH PRIVATE KEY-----"
                printf '%s\n' "$1"
                echo "-----END OPENSSH PRIVATE KEY-----"
              } > key.pem
            fi
          }

          if [ -f deploy/github_actions_key.pem ] && grep -q "BEGIN OPENSSH PRIVATE KEY" deploy/github_actions_key.pem; then
            cp deploy/github_actions_key.pem key.pem
          elif [ -f deploy/github_actions_key.pem.example ] && grep -q "BEGIN OPENSSH PRIVATE KEY" deploy/github_actions_key.pem.example; then
            cp deploy/github_actions_key.pem.example key.pem
          elif [ -n "$SSH_KEY" ]; then
            write_key_from_text "$SSH_KEY"
          else
            echo "::error::No SSH key found. Add deploy/github_actions_key.pem.example OR GitHub Secret SSH_PRIVATE_KEY"
            exit 1
          fi
          sed -i 's/\r$//' key.pem
          chmod 600 key.pem

          mkdir -p ~/.ssh
          ssh-keyscan -H 192.249.118.80 >> ~/.ssh/known_hosts 2>/dev/null || true

          if ssh -i key.pem -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new root@192.249.118.80 <<'ENDSSH'
          set -e
          cd /home/demowebsitv3/public_html/pos_admin
          export PATH="/usr/local/bin:/usr/bin:$PATH"
          npm install --production
          pm2 restart pos-api || pm2 start index.js --name pos-api
          ENDSSH
          then
            echo "App restarted via SSH."
          else
            echo "::warning::SSH failed (port 22 often blocked from GitHub IPs). Files were uploaded via FTP — restart Node manually on the server: pm2 restart pos-api"
            exit 1
          fi

