name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    environment: SSH_PRIVATE_KEY
    name: deploy
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Verify production dependencies install (not uploaded — symlinks break FTP)
        run: |
          npm ci --omit=dev
          node -e "require('iconv-lite').encodingExists('utf8')"
          echo "npm ci OK ($(du -sh node_modules | cut -f1))"

      - name: Bump deploy version (MAJOR.MINOR.<run#> on every push)
        id: bump_version
        run: |
          DEPLOY_VERSION="$(node deploy/bump-deploy-version.js)"
          echo "deployVersion=${DEPLOY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploy version: ${DEPLOY_VERSION}"

      - name: Write deploy build-info (version stamp for /health and /api/version)
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > deploy/build-info.json <<EOF
          {
            "deployVersion": "${{ steps.bump_version.outputs.deployVersion }}",
            "deployNumber": ${GITHUB_RUN_NUMBER},
            "gitCommit": "${GITHUB_SHA}",
            "gitCommitShort": "${SHORT}",
            "gitBranch": "${GITHUB_REF_NAME}",
            "deployedAt": "${DEPLOYED_AT}",
            "buildLabel": "v${{ steps.bump_version.outputs.deployVersion }}-${SHORT}",
            "workflowRunId": "${GITHUB_RUN_ID}"
          }
          EOF
          echo "Build stamp:"
          cat deploy/build-info.json

      - name: Write restart trigger for server cron (FTP upload)
        run: |
          {
            echo "run=${GITHUB_RUN_NUMBER}"
            echo "commit=${GITHUB_SHA}"
            echo "deployedAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > deploy/.restart-requested
          echo "Restart trigger:"
          cat deploy/.restart-requested

      - name: Sync application files (exclude node_modules — install on server via SSH)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: 192.249.118.80
          username: pos@testv3.websitedemolynk.com
          password: kYw8,ae@!1&]}dMR
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/node_modules
            deploy/github_actions_key.pem
            deploy/github_actions_key.pem.example

      - name: Prepare SSH key for server restart
        id: ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          write_key_from_text() {
            if echo "$1" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
              printf '%s\n' "$1" > key.pem
            elif echo "$1" | grep -q "BEGIN RSA PRIVATE KEY"; then
              printf '%s\n' "$1" > key.pem
            else
              {
                echo "-----BEGIN OPENSSH PRIVATE KEY-----"
                printf '%s\n' "$1"
                echo "-----END OPENSSH PRIVATE KEY-----"
              } > key.pem
            fi
          }

          if [ -f deploy/github_actions_key.pem ] && grep -q "BEGIN.*PRIVATE KEY" deploy/github_actions_key.pem; then
            cp deploy/github_actions_key.pem key.pem
          elif [ -n "$SSH_KEY" ]; then
            write_key_from_text "$SSH_KEY"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sed -i 's/\r$//' key.pem
          chmod 600 key.pem
          echo "has_key=true" >> "$GITHUB_OUTPUT"

      - name: Restart pos_admin on server (SSH)
        id: ssh_restart
        if: steps.ssh_key.outputs.has_key == 'true'
        continue-on-error: true
        env:
          SSH_HOST: ${{ vars.SSH_HOST || '192.249.118.80' }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          SSH_USER: ${{ vars.SSH_USER || 'root' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i key.pem -p "$SSH_PORT" -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            'bash /home/demowebsitv3/public_html/pos_admin/deploy/restart-pos-admin.sh'

          echo "✅ pos_admin restarted via SSH."

      - name: Post-deploy restart status
        if: always()
        run: |
          if [ "${{ steps.ssh_restart.outcome }}" = "success" ]; then
            echo "Restart: SSH succeeded (immediate)."
          elif [ "${{ steps.ssh_restart.outcome }}" = "failure" ]; then
            echo "::warning::SSH restart failed (port 22 often blocked from GitHub Actions on shared hosting)."
            echo "FTP uploaded deploy/.restart-requested — root cron should restart pos_admin within ~1 minute."
            echo "One-time setup: deploy/SETUP-GITHUB-SSH.md (cron section)."
          else
            echo "Restart: FTP trigger uploaded; waiting for server cron (see deploy/SETUP-GITHUB-SSH.md)."
          fi
          echo "Deploy files synced successfully."
