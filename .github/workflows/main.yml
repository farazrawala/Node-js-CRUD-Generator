name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    name: deploy
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install production dependencies (Linux — same as server)
        run: |
          npm ci --omit=dev
          node -e "require('iconv-lite').encodingExists('utf8')"
          echo "node_modules ready ($(du -sh node_modules | cut -f1))"

      - name: Sync files (includes node_modules — fixes iconv-lite on live)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: 192.249.118.80
          username: pos@testv3.websitedemolynk.com
          password: kYw8,ae@!1&]}dMR
          exclude: |
            **/.git*
            **/.git*/**
            deploy/github_actions_key.pem
            deploy/github_actions_key.pem.example

      - name: Start app on server — npm run dev (SSH)
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          write_key_from_text() {
            if echo "$1" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
              printf '%s\n' "$1" > key.pem
            else
              {
                echo "-----BEGIN OPENSSH PRIVATE KEY-----"
                printf '%s\n' "$1"
                echo "-----END OPENSSH PRIVATE KEY-----"
              } > key.pem
            fi
          }

          if [ -f deploy/github_actions_key.pem ] && grep -q "BEGIN OPENSSH PRIVATE KEY" deploy/github_actions_key.pem; then
            cp deploy/github_actions_key.pem key.pem
          elif [ -f deploy/github_actions_key.pem.example ] && grep -q "BEGIN OPENSSH PRIVATE KEY" deploy/github_actions_key.pem.example; then
            cp deploy/github_actions_key.pem.example key.pem
          elif [ -n "$SSH_KEY" ]; then
            write_key_from_text "$SSH_KEY"
          else
            echo "::warning::No SSH key — node_modules uploaded via FTP. On server run: cd /home/demowebsitv3/public_html/pos_admin && npm run dev"
            exit 0
          fi
          sed -i 's/\r$//' key.pem
          chmod 600 key.pem

          mkdir -p ~/.ssh
          ssh-keyscan -H 192.249.118.80 >> ~/.ssh/known_hosts 2>/dev/null || true

          if ssh -i key.pem -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new root@192.249.118.80 <<'ENDSSH'
          set -e
          cd /home/demowebsitv3/public_html/pos_admin
          export PATH="/usr/local/bin:/usr/bin:$PATH"
          node -e "require('iconv-lite').encodingExists('utf8')"
          pm2 delete pos-api 2>/dev/null || true
          pm2 start npm --name pos-api -- run dev
          pm2 save || true
          ENDSSH
          then
            echo "App started via pm2 (npm run dev)."
          else
            echo "::warning::SSH failed — node_modules uploaded via FTP. On the server run: cd /home/demowebsitv3/public_html/pos_admin && npm run dev"
            exit 1
          fi
