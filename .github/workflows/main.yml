name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    name: deploy
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Sync file
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: 192.249.118.80
          username: pos@testv3.websitedemolynk.com
          password: kYw8,ae@!1&]}dMR
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            deploy/github_actions_key.pem

      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          KEY_FILE=deploy/github_actions_key.pem
          if [ -f "$KEY_FILE" ] && grep -q "BEGIN OPENSSH PRIVATE KEY" "$KEY_FILE"; then
            cp "$KEY_FILE" key.pem
          elif [ -n "$SSH_KEY" ]; then
            if echo "$SSH_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
              printf '%s\n' "$SSH_KEY" > key.pem
            else
              {
                echo "-----BEGIN OPENSSH PRIVATE KEY-----"
                printf '%s\n' "$SSH_KEY"
                echo "-----END OPENSSH PRIVATE KEY-----"
              } > key.pem
            fi
          else
            echo "::error::Add deploy/github_actions_key.pem locally OR set GitHub Secret SSH_PRIVATE_KEY (copy contents of the .pem file)"
            exit 1
          fi
          chmod 600 key.pem

      - name: Restart app on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.249.118.80
          username: root
          key_path: key.pem
          port: 22
          timeout: 60s
          command_timeout: 10m
          debug: true
          script_stop: true
          script: |
            cd /home/demowebsitv3/public_html/pos_admin
            export PATH="/usr/local/bin:/usr/bin:$PATH"
            which node || true
            which npm || true
            which pm2 || true
            npm install --production
            pm2 restart pos-api || pm2 start index.js --name pos-api
