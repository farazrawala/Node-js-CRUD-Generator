# Apache: proxy /pos_admin to Node (npm run server on PORT=8000)
# Requires: mod_proxy, mod_proxy_http, AllowOverride or vhost include
#
# In .env on the server:
#   BASE_PATH=/pos_admin
#   BASE_URL=https://testv3.websitedemolynk.com/pos_admin
#   PORT=8000
#   NODE_ENV=production
#   APP_ENV=live

<Location /pos_admin>
    ProxyPreserveHost On
    ProxyPass http://127.0.0.1:8000/pos_admin
    ProxyPassReverse http://127.0.0.1:8000/pos_admin
</Location>

# Do NOT serve index.js as a static file under public_html/pos_admin.
# Run Node with PM2: pm2 start index.js --name pos-api
